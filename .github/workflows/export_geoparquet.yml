name: Export Geoparquet

on:
  workflow_dispatch:

jobs:
  export_geoparquet:
    runs-on: ubuntu-latest

    env:
      USGS_API_KEY: ${{ secrets.USGS_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run pipeline to generate geoparquet
        run: uv run src/main.py

      - name: Create GitHub Release and upload parquet
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoparquet-${{ github.run_id }}
          name: Geoparquet Export ${{ github.run_id }}
          files: monitoring_locations_with_time_series_metadata.parquet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
